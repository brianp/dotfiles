#Our .tmux.conf file
# Setting the prefix from C-b to C-a
set -g prefix C-a

# Free the original Ctrl-b prefix keybinding
unbind C-b

#setting the delay between prefix and command
set -s escape-time 1

# Ensure that we can send Ctrl-A to other apps
bind C-a send-prefix

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
setw -g pane-base-index 1

# Reload the file with Prefix r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# splitting panes
bind | split-window -h
bind - split-window -v

# moving between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick pane selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# mouse support - set to on if you want to use the mouse
set -g mouse off

# Modern terminal support (true color, undercurl, extended keys)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Ghostty extended keys support
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# Undercurl support (for Neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# enable activity alerts
setw -g monitor-activity on
set -g visual-activity on

# =============================================================================
# Tokyo Night theme (manual powerline style)
# =============================================================================

# Status bar
set -g status-style fg=#c0caf5,bg=#1a1b26

# Window list (inactive)
setw -g window-status-style fg=#565f89,bg=#1a1b26
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-style fg=#1a1b26,bg=#7aa2f7,bold
setw -g window-status-current-format " #I:#W "

# Pane borders
set -g pane-border-style fg=#414868
set -g pane-active-border-style fg=#7aa2f7

# Message/copy mode
set -g message-style fg=#c0caf5,bg=#292e42
setw -g mode-style fg=#c0caf5,bg=#292e42

# Status left - host > user > session
set -g status-left-length 80
set -g status-left "#[fg=#c0caf5,bg=#3d59a1,bold] 󰓋 #h #[fg=#3d59a1,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold]  #(whoami) #[fg=#7aa2f7,bg=#292e42]#[fg=#7aa2f7,bg=#292e42]  #S #[fg=#292e42,bg=#1a1b26] #[fg=#565f89] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null)"

# Status right - git branch + time
set -g status-right-length 80
set -g status-right "#[fg=#3d59a1]#[fg=#c0caf5,bg=#3d59a1]  %d %b %R "

# Refresh interval
set -g status-interval 5

# Center windows
set -g status-justify centre

# enable vi keys.
setw -g mode-keys vi

# Lazygit popup (prefix + g)
bind g display-popup -d "#{pane_current_path}" -xC -yC -w 80% -h 80% -E "lazygit"

